<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Education Perfect</title>
<link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYeO6_6ZI36WAv7zZog3J2fNBWsZT74YFuZQVHQlSjg02Q2FLz:https://www.educationperfect.com/wp-content/uploads/2024/07/ep-logo-512.png&s" />
<link rel="stylesheet" href="ui.css" />
</head>
<body>

<!-- ── Fullscreen iframe layer ────────────────────────────────── -->
<div id="fullscreen-layer">
  <iframe src="https://www.educationperfect.com/" allow="fullscreen; autoplay; camera; microphone; clipboard-read; clipboard-write; encrypted-media; pointer-lock; gyroscope" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals allow-pointer-lock allow-orientation-lock allow-presentation"></iframe>
</div>

<!-- ── Loading phase ──────────────────────────────────────────── -->
<div id="ph-loading" class="phase">
  <div class="loading-lines" id="loading-lines"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
</div>

<!-- ── Explore phase ──────────────────────────────────────────── -->
<div id="ph-explore" class="phase">
  <div class="label">WORKSPACE</div>
  <div class="ready">System ready.</div>
  <button class="btn-explore" onclick="gotoWelcome()">Explore</button>
</div>

<!-- ── Welcome phase ─────────────────────────────────────────── -->
<div id="ph-welcome" class="phase">
  <div class="notif">
    <div class="notif-header">— notification —</div>
    <div class="notif-title">Welcome to Workspace.</div>
    <div class="notif-body">This site is fully cloaked from your history.

Press ESC at any time to cloak this page.</div>
    <button class="btn-continue" onclick="gotoWorkspace()">Continue →</button>
  </div>
</div>

<!-- ── Workspace ─────────────────────────────────────────────── -->
<div id="workspace">
  <div id="windows-area"></div>
  <div id="taskbar">
    <button class="taskbar-icon" id="btn-search" onclick="toggleSearch()" title="Search">
      <span class="icon-glyph">⌕</span>
      <span class="icon-label">Search</span>
    </button>
    <button class="taskbar-icon" id="btn-games" onclick="toggleGames()" title="Games">
      <span class="icon-glyph">◈</span>
      <span class="icon-label">Games</span>
    </button>
    <div class="taskbar-clock" id="clock"></div>
  </div>
</div>

<script>
// ── URLs ────────────────────────────────────────────────────────
const SEARCH_URL = 'https://web-proxy--coder83231.replit.app/browser/';
const GAMES_URL  = 'https://lanyon-tutoring-help.github.io/untitled-games/';

// ── Phase management ────────────────────────────────────────────
let currentPhase = 'loading';
let isInWorkspace = false;
let workspaceLoaded = false;

function showPhase(id) {
  document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
  document.getElementById('workspace').classList.remove('active');
  if (id === 'workspace') {
    document.getElementById('workspace').classList.add('active');
    isInWorkspace = true;
  } else {
    const el = document.getElementById('ph-' + id);
    if (el) el.classList.add('active');
    isInWorkspace = false;
  }
  currentPhase = id;
}

function gotoWelcome()   { showPhase('welcome'); }
function gotoWorkspace() { showPhase('workspace'); startClock(); }

// ── Loading screen animation ─────────────────────────────────────
const LOAD_LINES = [
  { text: '> Initializing workspace environment...', bright: false, delay: 0 },
  { text: '> Loading core modules...', bright: false, delay: 280 },
  { text: '> Establishing secure session...', bright: false, delay: 580 },
  { text: '> Applying configuration...', bright: false, delay: 900 },
  { text: '> Mounting interface...', bright: false, delay: 1180 },
  { text: '', dim: true, delay: 1400 },
  { text: 'workspace v3.6.1  —  ready', bright: true, delay: 1600 },
];

function runLoadingScreen(callback) {
  const container = document.getElementById('loading-lines');
  const fill = document.getElementById('progress-fill');
  const total = LOAD_LINES.length;

  // Clear previous lines
  container.innerHTML = '';
  fill.style.width = '0%';

  LOAD_LINES.forEach((item, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'line' + (item.bright ? ' bright' : '') + (item.dim ? ' dim' : '');
      div.textContent = item.text;
      container.appendChild(div);
      requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('show')));
      fill.style.width = ((i + 1) / total * 100) + '%';
    }, item.delay);
  });

  setTimeout(() => {
    if (callback) callback();
  }, 2200);
}

// ── Clock ────────────────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('clock');
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    el.textContent = h + ':' + m;
  }
  tick();
  setInterval(tick, 10000);
}

// ── Window manager ───────────────────────────────────────────────
let searchWin = null;
let gamesWin  = null;
let zTop = 10;

function toggleSearch() {
  if (searchWin) { searchWin.close(); searchWin = null; document.getElementById('btn-search').classList.remove('open'); }
  else { searchWin = createWindow({ title: 'Search', url: SEARCH_URL, x: 80, y: 60, w: 820, h: 560, onClose: () => { searchWin = null; document.getElementById('btn-search').classList.remove('open'); } }); document.getElementById('btn-search').classList.add('open'); }
}

function toggleGames() {
  if (gamesWin) { gamesWin.close(); gamesWin = null; document.getElementById('btn-games').classList.remove('open'); }
  else { gamesWin = createWindow({ title: 'Games', url: GAMES_URL, x: 120, y: 80, w: 860, h: 560, onClose: () => { gamesWin = null; document.getElementById('btn-games').classList.remove('open'); } }); document.getElementById('btn-games').classList.add('open'); }
}

// ── createWindow ─────────────────────────────────────────────────
function createWindow({ title, url, x, y, w, h, onClose }) {
  const area = document.getElementById('windows-area');
  const areaH = area.offsetHeight;

  // Clamp initial position
  x = Math.max(0, Math.min(x, area.offsetWidth - w));
  y = Math.max(0, Math.min(y, areaH - h));

  // DOM
  const el = document.createElement('div');
  el.className = 'app-window';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.width  = w + 'px';
  el.style.height = h + 'px';
  el.style.zIndex = ++zTop;

  el.innerHTML = `
    <div class="window-titlebar">
      <span class="window-title">${escHtml(title)}</span>
      <div class="window-controls">
        <button class="window-btn maximize" title="Maximize">&#9633;</button>
        <button class="window-btn close" title="Close">&#x2715;</button>
      </div>
    </div>
    <div class="window-content">
      <iframe
        src="${escHtml(url)}"
        allow="fullscreen; autoplay; camera; microphone; clipboard-read; clipboard-write; encrypted-media; pointer-lock; gyroscope"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals allow-pointer-lock allow-orientation-lock allow-presentation"
      ></iframe>
    </div>
    <div class="rh rh-n"  data-dir="n"></div>
    <div class="rh rh-s"  data-dir="s"></div>
    <div class="rh rh-e"  data-dir="e"></div>
    <div class="rh rh-w"  data-dir="w"></div>
    <div class="rh rh-ne" data-dir="ne"></div>
    <div class="rh rh-nw" data-dir="nw"></div>
    <div class="rh rh-se" data-dir="se"></div>
    <div class="rh rh-sw" data-dir="sw"></div>
  `;

  area.appendChild(el);

  // Animate open
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('open')));

  // Bring to front on click
  el.addEventListener('mousedown', () => { el.style.zIndex = ++zTop; }, true);

  // State
  let rect = { x, y, w, h };
  let prevRect = null;
  let maximized = false;

  // ── Maximize ────────────────────────────────────────────────────
  el.querySelector('.maximize').addEventListener('click', () => {
    toggleMaximize(el);
  });

  // ── Close ───────────────────────────────────────────────────────
  function closeWin() {
    el.classList.remove('open');
    el.style.transform = 'scale(0.93)';
    el.style.opacity = '0';
    setTimeout(() => { el.remove(); if (onClose) onClose(); }, 220);
  }
  el.querySelector('.close').addEventListener('click', closeWin);

  // ── Drag ────────────────────────────────────────────────────────
  const titlebar = el.querySelector('.window-titlebar');
  let dragging = false, dragOX = 0, dragOY = 0;

  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.window-controls')) return;
    if (maximized) return;
    dragging = true;
    dragOX = e.clientX - el.offsetLeft;
    dragOY = e.clientY - el.offsetTop;
    el.classList.add('dragging');
    e.preventDefault();
  });

  titlebar.addEventListener('dblclick', (e) => {
    if (e.target.closest('.window-controls')) return;
    toggleMaximize(el);
  });

  // ── Resize ──────────────────────────────────────────────────────
  let resizing = false, resDir = '', resSX, resSY, resSW, resSH, resSL, resST;

  el.querySelectorAll('.rh').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      resizing = true;
      resDir = handle.dataset.dir;
      resSX = e.clientX; resSY = e.clientY;
      resSW = el.offsetWidth; resSH = el.offsetHeight;
      resSL = el.offsetLeft;  resST = el.offsetTop;
      e.preventDefault();
      e.stopPropagation();
    });
  });

  // Global mouse handlers
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);

  function onMouseMove(e) {
    if (dragging) {
      const nx = e.clientX - dragOX;
      const ny = Math.max(0, e.clientY - dragOY);
      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';
      rect.x = nx; rect.y = ny;
      return;
    }
    if (!resizing) return;

    const dx = e.clientX - resSX;
    const dy = e.clientY - resSY;
    let nx = resSL, ny = resST, nw = resSW, nh = resSH;

    if (resDir.includes('e')) nw = Math.max(280, resSW + dx);
    if (resDir.includes('s')) nh = Math.max(180, resSH + dy);
    if (resDir.includes('w')) { nw = Math.max(280, resSW - dx); nx = resSL + resSW - nw; }
    if (resDir.includes('n')) { nh = Math.max(180, resSH - dy); ny = resST + resSH - nh; }

    el.style.left   = nx + 'px'; el.style.top    = ny + 'px';
    el.style.width  = nw + 'px'; el.style.height = nh + 'px';
    rect = { x: nx, y: ny, w: nw, h: nh };
  }

  function onMouseUp() {
    if (dragging) { dragging = false; el.classList.remove('dragging'); }
    resizing = false;
  }

  // Store previous position/size for restore
  el.dataset.prevLeft = rect.x + 'px';
  el.dataset.prevTop = rect.y + 'px';
  el.dataset.prevWidth = rect.w + 'px';
  el.dataset.prevHeight = rect.h + 'px';

  // ── toggleMaximize function
  function toggleMaximize(winEl) {
    if (winEl.classList.contains('maximized')) {
      // Restore to previous size
      winEl.classList.remove('maximized');
      winEl.style.left = winEl.dataset.prevLeft || '100px';
      winEl.style.top = winEl.dataset.prevTop || '100px';
      winEl.style.width = winEl.dataset.prevWidth || '400px';
      winEl.style.height = winEl.dataset.prevHeight || '300px';
    } else {
      // Save current size
      winEl.dataset.prevLeft = winEl.style.left;
      winEl.dataset.prevTop = winEl.style.top;
      winEl.dataset.prevWidth = winEl.style.width;
      winEl.dataset.prevHeight = winEl.style.height;

      // Maximize
      winEl.classList.add('maximized');
      winEl.style.left = '0px';
      winEl.style.top = '0px';
      winEl.style.width = window.innerWidth + 'px';
      winEl.style.height = window.innerHeight + 'px';
    }
  }

  return { close: closeWin, toggleMaximize };
}

// ── Helper ───────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Popup windows from postMessage ───────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === '__workspace_open__' && typeof e.data.url === 'string') {
    createWindow({
      title: (() => { try { return new URL(e.data.url).hostname.replace(/^www\./, ''); } catch { return 'Browser'; } })(),
      url: e.data.url,
      x: 160 + (Math.random() * 60 | 0),
      y: 100 + (Math.random() * 40 | 0),
      w: 860,
      h: 560,
      onClose: null,
    });
  }
});

// ── ESC key handler ──────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const fullscreenLayer = document.getElementById('fullscreen-layer');
    const workspace = document.getElementById('workspace');

    if (isInWorkspace) {
      // Fade out workspace, show fullscreen iframe
      workspace.classList.remove('active');
      fullscreenLayer.classList.remove('hidden');
      isInWorkspace = false;
      workspaceLoaded = false;
    } else {
      // Hide fullscreen iframe, show loading, then workspace
      fullscreenLayer.classList.add('hidden');
      showPhase('loading');
      runLoadingScreen(() => {
        showPhase('explore');
      });
    }
  }
});

// ── Resize maximized windows on fullscreen change or resize
function resizeMaximizedWindows() {
  document.querySelectorAll('.app-window.maximized').forEach(win => {
    win.style.left = '0px';
    win.style.top = '0px';
    win.style.width = window.innerWidth + 'px';
    win.style.height = window.innerHeight + 'px';
  });
}

// Detect browser fullscreen change
document.addEventListener('fullscreenchange', () => {
  resizeMaximizedWindows();
});
// Also handle window resize (like entering browser fullscreen)
window.addEventListener('resize', () => {
  resizeMaximizedWindows();
});
</script>
</body>
</html>
